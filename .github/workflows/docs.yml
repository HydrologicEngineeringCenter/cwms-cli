# Confirm the docs build works on PRs touching docs or code
name: ReadTheDocs/Sphinx Validation
on:
  pull_request:
    paths: ["docs/**", "cwmscli/**", "pyproject.toml"]
  push:
    branches: [main]
    paths: ["docs/**", "cwmscli/**", "pyproject.toml"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r docs/requirements.txt
          pip install .
      - name: Sphinx build (treat warnings as errors)
        id: sphinx_html
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: sphinx-build -nW -b html docs docs/_build/html
      - name: Link check (optional)
        id: sphinx_linkcheck
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: sphinx-build -b linkcheck docs docs/_build/linkcheck
      - name: Docs validation summary
        if: always()
        run: |
          echo "## Docs validation" >> "$GITHUB_STEP_SUMMARY"
          echo "- HTML build: ${{ steps.sphinx_html.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Link check: ${{ steps.sphinx_linkcheck.outcome }}" >> "$GITHUB_STEP_SUMMARY"
      - name: Fail non-PR docs validation
        if: github.event_name != 'pull_request' && (steps.sphinx_html.outcome != 'success'
          || steps.sphinx_linkcheck.outcome != 'success')
        run: exit 1
